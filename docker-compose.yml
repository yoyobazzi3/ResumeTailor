services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: joblens
      POSTGRES_PASSWORD: joblens
      POSTGRES_DB: joblens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joblens"]
      interval: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://joblens:joblens@db:5432/joblens
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    # Apply Alembic migrations on every start so the DB schema matches the ORM (avoids
    # UndefinedColumnError when the postgres_data volume predates newer migrations).
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  postgres_data:
