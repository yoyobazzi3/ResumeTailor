server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # All routes fall through to index.html so React Router handles them client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively — Vite hashes filenames on build
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the root HTML — ensures users always get the latest version
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
